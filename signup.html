<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up | BookFinder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <main class="container py-5">
    <div class="auth-box mx-auto">
      <h2 class="mb-4 text-center">Create a BookFinder Account</h2>

      <form id="signupForm" novalidate>
        <div class="mb-3">
          <label for="signupName" class="form-label">Name</label>
          <input type="text" id="signupName" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="signupEmail" class="form-label">Email</label>
          <input type="email" id="signupEmail" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="signupPassword" class="form-label">Password</label>
          <input type="password" id="signupPassword" class="form-control" minlength="6" required>
        </div>

        <button type="submit" class="btn btn-success w-100">Sign Up</button>
      </form>

      <p id="signupMessage" class="mt-3 text-center" aria-live="polite"></p>
      <p class="mt-3 text-center">Already have an account? <a href="login.html">Login here</a></p>
      <p class="text-center"><a href="index.html">Back to Home</a></p>
    </div>
  </main>

  <script src="./js/auth.js"></script>
</body>
</html>
