<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | BookFinder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <main class="container py-5">
    <div class="auth-box mx-auto">
      <h2 class="mb-4 text-center">Login to BookFinder</h2>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label for="loginEmail" class="form-label">Email</label>
          <input type="email" id="loginEmail" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="loginPassword" class="form-label">Password</label>
          <input type="password" id="loginPassword" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>

      <p id="loginMessage" class="mt-3 text-center" aria-live="polite"></p>
      <p class="mt-3 text-center">No account? <a href="signup.html">Sign up here</a></p>
      <p class="text-center"><a href="index.html">Back to Home</a></p>
    </div>
  </main>

  <script src="./js/auth.js"></script>
</body>
</html>
